<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Celebración de Graduación 🎓</title>
<style>
/* ... KEEP YOUR ORIGINAL STYLES HERE ... */
</style>
</head>
<body>

<form action="https://formspree.io/f/xzdyvrkd" method="POST">
  <div class="rsvp-wrap">
    <div class="sh">
      <h2>RSVP 🙋</h2>
      <p>Let me know so I can get the reservation right!</p>
    </div>
    <div class="fbox">
      <div class="fg">
        <label for="nf">Your name</label>
        <input type="text" id="nf" name="name" placeholder="First and last name" maxlength="50" required>
      </div>
      
      <div class="fg">
        <label>Can you make it?</label>
        <div class="choices">
          <input type="hidden" name="status" id="statusField" required>
          <button type="button" class="ch" id="by" onclick="pick('yes')"><span class="ci">🥳</span>I'm in!</button>
          <button type="button" class="ch" id="bm" onclick="pick('maybe')"><span class="ci">🤔</span>Maybe...</button>
          <button type="button" class="ch" id="bn" onclick="pick('no')"><span class="ci">😢</span>Can't go</button>
        </div>
      </div>
      
      <div class="fg">
        <label for="mf">Message (optional)</label>
        <input type="text" id="mf" name="message" placeholder="Hype message, dietary stuff, etc." maxlength="100">
      </div>
      
      <button type="submit" class="gobtn">Send My RSVP 🎉</button>
    </div>
  </div>
</form>

<script>
  function pick(v){
    document.getElementById('statusField').value = v;
    document.getElementById('by').className = 'ch' + (v === 'yes' ? ' sy' : '');
    document.getElementById('bm').className = 'ch' + (v === 'maybe' ? ' sm' : '');
    document.getElementById('bn').className = 'ch' + (v === 'no' ? ' sn' : '');
  }
</script>

</body>
</html>
